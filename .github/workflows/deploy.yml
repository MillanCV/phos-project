name: Deploy Phos

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy on Raspberry Pi
    runs-on: [self-hosted, raspi]
    concurrency:
      group: phos-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend
        env:
          VITE_API_BASE_URL: ${{ vars.PHOS_API_BASE_URL }}
        run: |
          cd phos-portal
          npm ci
          npm run build

      - name: Update Backend
        run: |
          cd phos-engine
          /home/millan/.local/bin/uv sync
          /home/millan/.local/bin/uv run pytest -q

      - name: Restart Backend Service
        run: |
          sudo systemctl restart phos.service

      - name: Restart Frontend Service
        run: |
          if sudo systemctl list-unit-files | grep -q '^phos-portal.service'; then
            sudo systemctl restart phos-portal.service
          else
            echo "phos-portal.service not found, skipping restart"
          fi

      - name: Verify Backend Health
        run: |
          for i in {1..15}; do
            if curl --fail --silent --show-error http://127.0.0.1:8000/api/health; then
              exit 0
            fi
            echo "Backend healthcheck intento $i/15 fallido, reintentando..."
            sleep 2
          done
          echo "Backend no responde tras reintentos. Diagnostico:"
          sudo systemctl status phos.service --no-pager -l || true
          sudo journalctl -u phos.service -n 120 --no-pager -l || true
          exit 1

      - name: Verify Frontend Health
        run: |
          if sudo systemctl list-unit-files | grep -q '^phos-portal.service'; then
            for i in {1..15}; do
              if curl --fail --silent --show-error http://127.0.0.1:4173 > /dev/null; then
                exit 0
              fi
              echo "Frontend healthcheck intento $i/15 fallido, reintentando..."
              sleep 2
            done
            echo "Frontend no responde tras reintentos. Diagnostico:"
            sudo systemctl status phos-portal.service --no-pager -l || true
            sudo journalctl -u phos-portal.service -n 120 --no-pager -l || true
            exit 1
          else
            echo "phos-portal.service not found, skipping frontend healthcheck"
          fi
