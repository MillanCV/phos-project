name: Deploy Phos

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy on Raspberry Pi
    runs-on: [self-hosted, raspi]
    concurrency:
      group: phos-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend
        env:
          VITE_API_BASE_URL: ${{ vars.PHOS_API_BASE_URL }}
        run: |
          cd phos-portal
          npm ci
          npm run build

      - name: Update Backend
        run: |
          cd phos-engine
          /home/millan/.local/bin/uv sync

      - name: Restart Backend Service
        run: |
          sudo systemctl restart phos.service

      - name: Restart Frontend Service
        run: |
          if sudo systemctl list-unit-files | grep -q '^phos-portal.service'; then
            sudo systemctl restart phos-portal.service
          else
            echo "phos-portal.service not found, skipping restart"
          fi
